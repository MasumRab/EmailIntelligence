name: Dependency Vulnerability Check

on:
  push:
    branches: [main, scientific, orchestration-tools]
  pull_request:
    branches: [main, scientific, orchestration-tools]
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'setup/pyproject.toml'

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run pip-audit
        run: uv run pip-audit --desc --fix --strict || true

  npm-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    if: |
      hashFiles('client/package.json') != '' ||
      hashFiles('package.json') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true
