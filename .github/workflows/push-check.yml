name: Push Check

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Python fast checks on push to main
  python-lint:
    name: Python Lint Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'setup/pyproject.toml'

      - name: Install dependencies
        run: uv pip install -r requirements-dev.txt

      - name: Ruff check
        run: python -m ruff check src/ modules/ setup/

      - name: Ruff format check
        run: python -m ruff format --check src/ modules/ setup/

  # Python compile check on push to main
  python-compile:
    name: Python Compile Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'setup/pyproject.toml'

      - name: Install dependencies
        run: uv pip install -r requirements-dev.txt

      - name: Python compile check
        run: |
          uv run python -m py_compile src/**/*.py setup/*.py
          uv run python -m py_compile modules/**/*.py || true
