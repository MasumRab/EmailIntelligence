name: CI

on:
  push:
    branches: [main, scientific]
  pull_request:
    branches: [main, scientific]

permissions:
  contents: read

jobs:
  test:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests
        run: |
          uv run pytest tests/ src/ modules/ -v --tb=short \
            --cov=src --cov=modules --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80
      - name: Run Security Scans
        run: uv run bandit -r src/ modules/
      - name: Run linting
        run: |
          uv run ruff check src/ modules/
          uv run ruff format --check src/ modules/
      - name: Type checking
        run: uv run mypy src/ modules/ --show-error-codes --no-strict-optional

  lint-only:
    # Allow CI to pass for Dependabot PRs while we fix linting on main
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'dependabot[bot]'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run ruff
        run: |
          uv run ruff check src/ modules/
          uv run ruff format --check src/ modules/
