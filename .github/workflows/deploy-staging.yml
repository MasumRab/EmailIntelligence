name: Deploy to Staging

permissions:
  contents: read

on:
  push:
    branches: [ staging ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Deploy to staging
        run: |
          python deployment/deploy.py staging build
          python deployment/deploy.py staging up