# Rule: Rich Output
# Enforces rich CLI output patterns for dev.py
# Severity: warning

id: devpy-rich-output
language: python
severity: warning
rule:
  # Check for rich usage
  any:
    - not:
        has:
          kind: import
          has:
            module:
              text: rich
message: "dev.py CLI should use rich for enhanced terminal output."
note: "Import rich: from rich.console import Console; console = Console()"
