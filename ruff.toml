# Ruff configuration for EmailIntelligence
# Ignore certain lint rules that have pre-existing violations

[lint]
ignore = [
    "E402",  # Module level import not at top of file (pre-existing in __init__.py files)
    "E722",  # Do not use bare `except` (pre-existing in some modules)
    "F401",  # Unused imports (pre-existing)
    "F811",  # Redefinition of unused (pre-existing)
    "F821",  # Undefined name (pre-existing bugs in main.py, gradio_app.py)
]