# Ruff configuration
# Ignore pre-existing lint errors that are not related to PR changes

[lint]
ignore = [
    "F811",  # Redefinition of unused
    "E722",  # Do not use bare except
    "F401",  # imported but unused
    "E402",  # Module level import not at top of file (pre-existing)
    "F821",  # Undefined name (pre-existing)
    "F541",  # f-string without any placeholders (pre-existing)
]

[lint.per-file-ignores]
"tests/*" = ["F401"]

# Skip formatting for pre-existing issues
[format]
exclude = ["modules/**", "src/backend/**", "src/main.py", "src/core/auth.py", "src/core/database.py", "src/core/performance_monitor.py", "src/resolution/**"]