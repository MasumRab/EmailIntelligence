# Ruff configuration
line-length = 100

[lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E402",  # Module level imports not at top of file (common in main.py patterns)
    "E501",  # Line too long (many existing long lines in codebase)
    "F401",  # Unused imports (many imports in try/except blocks)
    "F811",  # Redefinition of unused names (legacy code patterns)
    "F821",  # Undefined names (existing code issues)
    "UP042",  # Enum inheritance patterns (Python 3.11 compatibility)
    "UP035",  # Deprecated typing imports (existing code)
    "W291",  # Trailing whitespace (existing code)
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "F811", "F821"]
"tests/*" = ["F401", "F811", "E402", "F821", "W291"]
